name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Copy project files to Droplet
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "."
          target: "~/Hexplain"

      - name: Build and Restart Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd ~/Hexplain
            
            mkdir -p backend/data backend/quarantine
            chmod -R 777 backend/data backend/quarantine
            
            # 1. Pre-deploy backup of the database
            if [ -f backend/data/Hexplain.db ]; then
              cp backend/data/Hexplain.db backend/data/Hexplain.db.bak.$(date +%Y%m%d_%H%M%S)
            fi
            
            # Tag current stable images for potential rollback
            docker tag hexplain-api:latest hexplain-api:previous || true
            docker tag hexplain-worker:latest hexplain-worker:previous || true
            docker tag hexplain-frontend:latest hexplain-frontend:previous || true
            
            # 2. Restart all containers with the new code
            docker compose down
            docker compose up -d --build
            
            # 3. Health check with retry
            HEALTHY=false
            for i in {1..10}; do
              sleep 5
              if curl -s -f http://localhost:8000/api/health > /dev/null; then
                HEALTHY=true
                echo "Health check passed!"
                break
              fi
              echo "Waiting for API to be healthy... ($i/10)"
            done
            
            if [ "$HEALTHY" = false ]; then
              echo "Health check FAILED. Initiating rollback..."
              docker compose down
              # Wait, without a registry, rolling back to previous tags is complex in compose.
              # We will leave the containers stopped and alert so we don't serve broken code.
              echo "Rollback: Please check the server manually. Containers stopped."
              exit 1
            fi
            
            # Prune dangling images
            docker image prune -f
